spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/meeting_assistant}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
  task:
    execution:
      pool:
        core-size: 4
        max-size: 10
        queue-capacity: 25
      thread-name-prefix: async-analysis-

server:
  port: 8080

app:
  deepgram:
    api-key: "key"
    url: wss://api.deepgram.com/v1/listen
    model: nova-2
    language: en-US
    punctuate: true
    diarize: true
    smart-format: true
  openai:
    api-key: "key"
    model: "gemini-3.5-flash"
    max-tokens: 2000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    com.synrixa: DEBUG
    org.springframework.web.socket: INFO